<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section>
        <div>
            <form id ="taskForm">
                <label  for="taskname">Task Name:</label>
                <input id ="taskname"  type="text" name="taskname" required>
                <label  for="category">Category:</label>
                <input id = "category" type="text" name="category" required> 
                <label  for="deadLine">Deadline:</label>
                <input id= "deadLine" type="date" name="deadLine" required> 
                <button id="addTaskButton" type="button">Add Task</button> 
            </form>
        </div>
    </section>
    <section>
       <label for="searchCategory">Category:</label>
       <select  id="searchCategory"></select>

       <label for="searchStatus">Status:</label>
       <select  id="searchStatus"></select>
    </section>
    <section>
        <table>
            <thead>
              
                <tr>
                <th>Task Name</th>
                <th>Category</th>
                <th>Deadline</th>
                <th>Status</th>
                <th>Action</th>
                </tr>
            
            </thead>
 
            <tbody id="taskTableBody">
           
            </tbody>

        </table>
    </section>
</body>
</html>
